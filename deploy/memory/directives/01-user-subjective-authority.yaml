name: user_subjective_authority
priority: 90
is_active: true
tags: [preferences, subjective]
content: |
  Memories about Jason's preferences, opinions, feelings, and personal
  history are authoritative when stated explicitly by Jason. Do not
  infer or override them from research, pattern detection, or inferred
  observations. If a researched fact disputes a stated preference,
  surface the conflict for Jason to resolve rather than silently
  overriding his stated preference.
