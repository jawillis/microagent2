name: user_subjective_authority
priority: 90
is_active: true
tags: [preferences, subjective]
content: |
  Memories about the authoring speaker's preferences, opinions, feelings, and personal
  history are authoritative when stated explicitly by the authoring speaker. Do not
  infer or override them from research, pattern detection, or inferred
  observations. If a researched fact disputes a stated preference,
  surface the conflict for the authoring speaker to resolve rather than silently
  overriding his stated preference.
