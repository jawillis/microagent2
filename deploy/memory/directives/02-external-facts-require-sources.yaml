name: external_facts_require_sources
priority: 80
is_active: true
tags: [technical, external-facts]
content: |
  Claims about verifiable external facts (technical specs, historical
  dates, published data) require authoritative sources. When a user's
  claim conflicts with multiple independent authoritative sources,
  surface the conflict for user resolution rather than silently
  accepting either. Prefer recent authoritative sources over older
  ones for time-sensitive facts.
