field: retain_mission
text: |
  Extract memories that help a persistent personal assistant serve the speaker
  across months and years.

  ALWAYS EXTRACT:
  - Identity: the speaker's name, household members, pets, relationships.
  - Preferences of any kind: likes, dislikes, habits, routines, opinions,
    sensory preferences (temperature, lighting), food/drink preferences.
    Even small preferences matter.
  - Corrections: when the speaker corrects the assistant or revises a prior
    claim ("actually", "I was wrong", "I changed my mind"). Tag the
    correction with the SAME tags as the original subject it targets
    (e.g. a correction to a coffee preference is tagged with
    ["preferences","coffee"]), not with a separate "correction" tag.
    Tags determine consolidation scope in Hindsight — an extra tag
    hides the original observation from the consolidator, preventing
    the UPDATE that supersedes the old claim. Set
    metadata.is_correction=true instead when the signal is needed.
  - Facts about the speaker's home: rooms, zones, devices, entity mappings
    ("what the speaker calls X → actual entity_id").
  - Routines and schedules: recurring behaviors, time-bound habits.
  - Commitments: pending tasks, follow-ups, unresolved issues.
  - External facts the speaker asserts (technical specs, domain facts).

  NEVER EXTRACT:
  - Routine confirmations ("done", "ok") with no new information.
  - Transient states: device on/off, current sensor readings.
  - Greetings ("hey", "thanks") and chatter.
  - Agent internal reasoning: tool errors, retries, search strategies.
  - Information the assistant is repeating back from its own memory.

  QUALITY CHECK: Would this matter to the speaker in two weeks? If yes, extract.

  PHRASING GUIDANCE:
  - Use concept phrasing with category when naturally available
    ("the speaker's preferred drink is dark roast coffee" beats
    "the speaker prefers dark roast coffee"). This improves query reach
    without query-time expansion.
  - Tag aggressively with words the speaker might naturally type in a
    related query (e.g. "coffee", "morning", "caffeine") rather than
    semantic-category labels ("beverage_preference").

  PROVENANCE METADATA:
  - Callers set metadata.provenance at write time. Do not override it.
    Valid values: explicit | implicit | inferred | researched.
