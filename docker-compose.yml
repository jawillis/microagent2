services:
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey-data:/data
    command: valkey-server --appendonly yes
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - microagent

  gateway:
    build:
      context: .
      dockerfile: deploy/Dockerfile.gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      - VALKEY_ADDR=valkey:6379
      - GATEWAY_PORT=8080
      - LLAMA_ADDR=http://${LLAMA_SERVER_ADDR:-host.docker.internal:8081}
      - MEMORY_SERVICE_ADDR=http://memory-service:8083
      - SESSION_HASH_TTL_HOURS=${SESSION_HASH_TTL_HOURS:-24}
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - microagent

  context-manager:
    build:
      context: .
      dockerfile: deploy/Dockerfile.context-manager
    environment:
      - VALKEY_ADDR=valkey:6379
      - MEMORY_SERVICE_ADDR=http://memory-service:8083
      - SYSTEM_PROMPT=${SYSTEM_PROMPT:-You are a helpful assistant.}
    depends_on:
      valkey:
        condition: service_healthy
      memory-service:
        condition: service_started
    networks:
      - microagent

  hindsight:
    # The Hindsight image is operator-provided. Set HINDSIGHT_IMAGE in .env
    # to the container image you want to run (see
    # https://github.com/vectorize-io/hindsight).
    #
    # The quickstart image bundles an embedded Postgres at /home/hindsight/.pg0.
    # Persisted via a named volume so data survives restarts.
    image: ${HINDSIGHT_IMAGE}
    environment:
      # Point Hindsight's LLM provider at llm-proxy so its calls ride the
      # hindsight-class slots on our broker. llama.cpp speaks OpenAI-compat
      # via the proxy.
      - HINDSIGHT_API_LLM_PROVIDER=openai
      - HINDSIGHT_API_LLM_API_KEY=${HINDSIGHT_LLM_API_KEY:-sk-local}
      - HINDSIGHT_API_LLM_BASE_URL=http://llm-proxy:8082/v1
      - HINDSIGHT_API_LLM_MODEL=${HINDSIGHT_LLM_MODEL:-unsloth}
      # Skip startup LLM verification — llm-proxy needs hindsight-class slots
      # free for verification to succeed, which races with our startup order.
      - HINDSIGHT_API_SKIP_LLM_VERIFICATION=true
    # Named volumes mount root-owned under podman; Hindsight runs as uid 1000
    # and its embedded Postgres needs write access. Run as 1000:1000 and let
    # the container initialize /home/hindsight/.pg0 on first boot — with an
    # empty volume, it inherits the container's working ownership.
    user: "1000:1000"
    ports:
      # Control Plane UI — browse http://localhost:9999 to inspect banks,
      # memories, observations, and configuration. API is also exposed on
      # 8888 for direct curl/OpenAPI inspection.
      - "${HINDSIGHT_CP_PORT:-9999}:9999"
      - "${HINDSIGHT_API_PORT:-8888}:8888"
    volumes:
      - hindsight-data:/home/hindsight/.pg0
    mem_limit: ${HINDSIGHT_MEM_LIMIT:-2g}
    restart: unless-stopped
    depends_on:
      llm-proxy:
        condition: service_started
    networks:
      - microagent

  memory-service:
    build:
      context: .
      dockerfile: deploy/Dockerfile.memory-service
    environment:
      - VALKEY_ADDR=valkey:6379
      - HINDSIGHT_ADDR=http://hindsight:8888
      - HINDSIGHT_API_KEY=${HINDSIGHT_API_KEY:-}
      - HINDSIGHT_WEBHOOK_SECRET=${HINDSIGHT_WEBHOOK_SECRET:?HINDSIGHT_WEBHOOK_SECRET must be set}
      - MEMORY_BANK_ID=${MEMORY_BANK_ID:-microagent2}
      - MEMORY_SERVICE_HTTP_ADDR=:8083
      - MEMORY_SERVICE_EXTERNAL_URL=http://memory-service:8083
      - MEMORY_SERVICE_CP_URL=${MEMORY_SERVICE_CP_URL:-http://localhost:${HINDSIGHT_CP_PORT:-9999}}
      - MEMORY_YAML_DIR=/etc/microagent2/memory
      - HEARTBEAT_INTERVAL_MS=${HEARTBEAT_INTERVAL_MS:-3000}
    depends_on:
      hindsight:
        condition: service_started
      valkey:
        condition: service_healthy
    networks:
      - microagent

  llm-broker:
    build:
      context: .
      dockerfile: deploy/Dockerfile.llm-broker
    environment:
      - VALKEY_ADDR=valkey:6379
      - LLAMA_SERVER_ADDR=${LLAMA_SERVER_ADDR:-host.docker.internal:8081}
      - LLAMA_API_KEY=${LLAMA_API_KEY:-}
      - SLOT_COUNT=${SLOT_COUNT:-6}
      - AGENT_SLOT_COUNT=${AGENT_SLOT_COUNT:-4}
      - HINDSIGHT_SLOT_COUNT=${HINDSIGHT_SLOT_COUNT:-2}
      - PREEMPT_TIMEOUT_MS=${PREEMPT_TIMEOUT_MS:-5000}
      - PROVISIONAL_TIMEOUT_MS=${PROVISIONAL_TIMEOUT_MS:-2000}
      - SLOT_SNAPSHOT_INTERVAL_S=${SLOT_SNAPSHOT_INTERVAL_S:-30}
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - microagent

  llm-proxy:
    build:
      context: .
      dockerfile: deploy/Dockerfile.llm-proxy
    environment:
      - VALKEY_ADDR=valkey:6379
      - LLM_PROXY_HTTP_ADDR=:8082
      - LLM_PROXY_IDENTITY=${LLM_PROXY_IDENTITY:-llm-proxy}
      - LLM_PROXY_SLOT_TIMEOUT_MS=${LLM_PROXY_SLOT_TIMEOUT_MS:-10000}
      - LLM_PROXY_REQUEST_TIMEOUT_MS=${LLM_PROXY_REQUEST_TIMEOUT_MS:-300000}
    depends_on:
      valkey:
        condition: service_healthy
      llm-broker:
        condition: service_started
    networks:
      - microagent

  main-agent:
    build:
      context: .
      dockerfile: deploy/Dockerfile.main-agent
    environment:
      - VALKEY_ADDR=valkey:6379
      - AGENT_ID=main-agent
      - AGENT_PRIORITY=0
      - AGENT_PREEMPTIBLE=false
      - HEARTBEAT_INTERVAL_MS=${HEARTBEAT_INTERVAL_MS:-3000}
      - SKILLS_DIR=/app/skills
      - TOOL_LOOP_MAX_ITER=${TOOL_LOOP_MAX_ITER:-10}
    volumes:
      - ./skills:/app/skills:ro
    depends_on:
      valkey:
        condition: service_healthy
      llm-broker:
        condition: service_started
    networks:
      - microagent

  retro-agent:
    build:
      context: .
      dockerfile: deploy/Dockerfile.retro-agent
    environment:
      - VALKEY_ADDR=valkey:6379
      - MEMORY_SERVICE_ADDR=http://memory-service:8083
      - AGENT_ID=retro-agent
      - AGENT_PRIORITY=1
      - AGENT_PREEMPTIBLE=true
      - HEARTBEAT_INTERVAL_MS=${HEARTBEAT_INTERVAL_MS:-3000}
      - INACTIVITY_TIMEOUT_S=${INACTIVITY_TIMEOUT_S:-300}
    depends_on:
      valkey:
        condition: service_healthy
      llm-broker:
        condition: service_started
      memory-service:
        condition: service_started
    networks:
      - microagent

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    environment:
      - OPENAI_API_BASE_URL=http://mitmweb:8080/v1
      - OPENAI_API_KEY=none
      - USE_OLLAMA_DOCKER=false
      - ANONYMIZED_TELEMETRY=false
      - DO_NOT_TRACK=true
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - gateway
    networks:
      - microagent

  mitmweb:
    image: mitmproxy/mitmproxy
    container_name: mitmweb
    restart: unless-stopped
    ports:
      - "8082:8080"
      - "8083:8081"
    command: mitmweb --web-host 0.0.0.0 --set web_password=nerdtastic --mode reverse:http://gateway:8080
    networks:
      - microagent

networks:
  microagent:
    driver: bridge

volumes:
  valkey-data:
  open-webui-data:
  hindsight-data:
